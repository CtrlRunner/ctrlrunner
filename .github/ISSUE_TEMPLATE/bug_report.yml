name: Bug report
description: Report a problem with ctrlrunner
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill in as much detail as you can.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps (or a minimal test file / `ctrlrunner.toml`) that trigger it.
      placeholder: |
        1. `ctrlrunner.toml`:
           ...
        2. Run: `ctrlrunner --project ...`
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output / traceback
      render: shell
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: ctrlrunner version
      placeholder: "e.g. 0.1.0 (run `ctrlrunner --version` or `pip show ctrlrunner`)"
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      placeholder: "e.g. 3.12.4"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Windows
        - macOS
        - Linux
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues for a duplicate
          required: true
